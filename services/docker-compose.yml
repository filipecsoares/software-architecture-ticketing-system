version: '3.8'

services:
  event-service:
    build:
      context: .
      dockerfile: ./event-service/Dockerfile
    ports:
      - "8100:8100"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=event-service
      - APP_NAME=event-service
    container_name: event-service
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
  room-service:
    build:
      context: .
      dockerfile: ./room-service/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=room-service
      - APP_NAME=room-service
    container_name: room-service
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
  ticket-service:
    build:
      context: .
      dockerfile: ./ticket-service/Dockerfile
    ports:
      - "8300:8300"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=ticket-service
      - APP_NAME=ticket-service
    container_name: ticket-service
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    ports:
      - "8400:8400"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=order-service
      - APP_NAME=order-service
    container_name: order-service
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
  customer-service:
    build:
      context: .
      dockerfile: ./customer-service/Dockerfile
    ports:
      - "8500:8500"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=customer-service
      - APP_NAME=customer-service
    container_name: customer-service
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    ports:
      - "8600:8600"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=payment-service
      - APP_NAME=payment-service
    container_name: payment-service
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
  wiremock:
    image: "wiremock/wiremock:latest"
    container_name: payment-external-gateway
    ports:
      - "9999:8080"
    volumes:
      - ./payment-external-gateway/wiremock/mappings:/home/wiremock/mappings
    entrypoint: ["/docker-entrypoint.sh", "--global-response-templating", "--disable-gzip", "--verbose"]
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
  kafka-broker:
    image: bitnamilegacy/kafka:3.6
    container_name: kafka-broker
    ports:
      - "9092:9092"    # para containers
      - "29092:29092"  # para o host (Offset Explorer, etc)
    environment:
      - KAFKA_KRAFT_CLUSTER_ID=3gZZoPxyRWeMvax8Io2dKw
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-broker:9092,HOST://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-broker:9093
    restart: unless-stopped
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    container_name: keycloak
    command: start-dev
    ports:
      - "8999:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HOSTNAME=localhost
      - KC_FRONTEND_URL=http://localhost:8999
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    restart: unless-stopped
    volumes:
      - ./docker/keycloak/data:/opt/keycloak/data
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
  admin-service:
    build:
      context: .
      dockerfile: ./admin-service/Dockerfile
    ports:
      - "8700:8700"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=admin-service
      - APP_NAME=admin-service
    container_name: admin-service
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend
  frontend:
    build:
      context: ./frontend-with-keycloak
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    container_name: frontend-app
  
  # Prometheus Service
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app_network

  ## Tempo Service
  tempo:
    image: grafana/tempo
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
      - ./docker/tempo/tempo-data:/tmp/tempo
    ports:
      - "3200:3200" # Tempo
      - "9411:9411" # zipkin
    networks:
        - app_network

  #loki Service
  loki:
    image: grafana/loki:main
    container_name: loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    ports:
      - "3100:3100"
    networks:
        - app_network

  # Grafana Service
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=password
    networks:
      - app_network
    



networks:
  app_network: # Custom network for container communication
    driver: bridge

volumes:
  grafana-data: